<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | PTP Admin</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <h2>PTP</h2>
      <span>Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="active">📊 Dashboard</a>
      <a href="rooms.html">🛏️ Rooms</a>
      <a href="bookings.html">📅 Bookings</a>
      <a href="messages.html">✉️ Messages</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <h1>Dashboard Overview</h1>
      <div class="admin-user">
        <span>Admin User</span>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="admin-content">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-num skeleton" style="width:50%; height:40px; margin-bottom:10px;"></div>
          <div class="stat-label skeleton" style="width:80%; height:15px;"></div>
        </div>
        <div class="stat-card">
          <div class="stat-num skeleton" style="width:50%; height:40px; margin-bottom:10px;"></div>
          <div class="stat-label skeleton" style="width:80%; height:15px;"></div>
        </div>
      </div>

      <div class="flex-between mb-2">
        <h2 style="font-family:var(--font-heading);">Recent Bookings</h2>
        <a href="bookings.html" style="color:var(--gold); text-decoration:none; font-size:0.9rem;">View All →</a>
      </div>

      <div class="admin-table-container mb-2">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Room</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingsTableBody">
            <tr>
              <td colspan="5" class="text-center" style="padding: 2rem;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/dashboard.js"></script>
</body>
</html>
